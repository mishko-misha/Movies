{% extends "base.html" %}
{% block content %}

<h1>Movie Home Page</h1>

{% if films %}
<ul>
    {% for film in films %}
    <li>
        <strong>{{ film['name'] }}</strong> — <small>{{ film['year'] }} year ({{ film['country'] }}) <a
            href="/films/{{ film['id'] }}">{{ film['name'] }}</a></small>
    </li>
    {% endfor %}
</ul>
{% else %}
<p>No films yet.</p>
{% endif %}
{% endblock %}
